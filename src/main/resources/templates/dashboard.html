<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragment/layout :: main-layout(~{::section}, ~{::title}, ~{::style})}">
<head>
    <title>Sentinel Dashboard</title>

    <style>
        /* Two-column layout: Sidebar for navigation and Main-Content for primary data */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: calc(100vh - 70px); /* Adjusts for the navbar height */
        }

        .sidebar {
            background: #1e293b;
            padding: 25px;
            border-right: 1px solid #334155;
        }

        .main-content {
            padding: 40px;
            background: #0f172a;
        }

        /* Card layout for presenting decrypted PII or system metrics */
        .stats-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #334155;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<section>
    <div class="dashboard-grid">
        <div class="sidebar">
            <h3 style="color: #3b82f6;">Sentinel Commands</h3>
            <p>Status: <span style="color: #22c55e;">Active</span></p>
        </div>

        <div class="main-content">
            <h1>Welcome, <span th:text="${user.name}">User</span></h1>

            <div class="stats-card">
                <h3>Identity Handshake</h3>
                <p>Access ID: <span th:text="${user.email}" style="font-family: monospace;">email</span></p>
            </div>
        </div>
    </div>
</section>

</body>
</html>
